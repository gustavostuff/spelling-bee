<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Spelling Bee Practice</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Spelling Bee Practice</h1>

    <section class="card" aria-live="polite">
      <div id="toast" class="toast hidden"></div>
      <div id="word" class="word">loading...</div>
      <div id="counts" class="counts">Correct: 0   Wrong: 0</div>
    </section>

    <section class="buttons">
      <button id="btnCorrect" class="btn btn-good" type="button">Correct</button>
      <button id="btnWrong" class="btn btn-bad" type="button">Wrong</button>
    </section>

    <section class="panel range-panel">
      <h2>Word range</h2>
      <form id="rangeForm" class="range-controls">
        <label class="field">
          <span>From</span>
          <input id="rangeStart" type="number" min="1" step="1" inputmode="numeric" />
        </label>
        <label class="field">
          <span>To</span>
          <input id="rangeEnd" type="number" min="1" step="1" inputmode="numeric" />
        </label>
        <button id="btnApplyRange" class="btn btn-neutral" type="submit">Apply range</button>
      </form>
      <p id="rangeSummary" class="muted">Range: all words</p>
    </section>

    <footer class="panel panel-footer">
      <button id="btnReset" class="btn btn-neutral" type="button">Reset counters</button>
      <button id="btnHardest" class="btn btn-neutral" type="button">Top hardest</button>
    </footer>

    <section id="hardestPanel" class="panel hidden">
      <h2>Top hardest (by wrong count)</h2>
      <ol id="hardestList" class="hardest"></ol>
      <p class="muted">Tip: do 5 minutes focusing on these, then go back to random mode.</p>
    </section>

    <section class="panel word-grid-panel" aria-label="Word map: hover a cell for the word">
      <div class="word-grid-stats muted" aria-live="polite">
        <div class="word-grid-stat">
          <span class="word-grid-stat-label">Wrong &gt; correct</span>
          <strong id="wordGridStatMoreWrong" class="word-grid-stat-num">0</strong>
        </div>
        <div class="word-grid-stat">
          <span class="word-grid-stat-label">Correct &gt; wrong</span>
          <strong id="wordGridStatMoreCorrect" class="word-grid-stat-num">0</strong>
        </div>
        <div class="word-grid-stat">
          <span class="word-grid-stat-label">Both zero</span>
          <strong id="wordGridStatBothZero" class="word-grid-stat-num">0</strong>
        </div>
      </div>
      <table class="word-grid" id="wordGrid">
        <tbody id="wordGridBody"></tbody>
      </table>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="test.js"> </script>
</body>
</html>
